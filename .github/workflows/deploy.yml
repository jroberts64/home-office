name: Deploy

# Build and deploy home-office (CloudFormation app stack + static site) on every
# push to main. Authenticates to AWS via GitHub OIDC (no stored secrets) by
# assuming the repo-scoped role created in deploy/github-oidc.yaml.
#
# Prereqs (one-time):
#   1. Deploy deploy/github-oidc.yaml via deploy/bootstrap-oidc.sh.
#   2. Set repo variable AWS_DEPLOY_ROLE_ARN to the DeployRoleArn output
#      (Settings → Secrets and variables → Actions → Variables).
#   3. Write the SSM SecureString parameter (docs/make_parameter.py) — the app
#      itself reads it at request time; the deploy does not need it.

on:
  push:
    branches: [main]

# Required for OIDC: the workflow needs to mint an id-token.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build & deploy
        run: ./deploy/deploy.sh
        # AWS_PROFILE intentionally unset — the assumed role provides creds.
        # Custom domain (repo variables). If unset, the stack serves on the
        # default *.cloudfront.net URL. Keep these set so each deploy preserves
        # the home-office.jack-roberts.com alias instead of removing it.
        env:
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
