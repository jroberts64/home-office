AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  home-office — static guest page (S3 + CloudFront) plus a TOTP-gated Lambda
  that reads a single encrypted JSON parameter from SSM Parameter Store.

Parameters:
  ParameterName:
    Type: String
    Default: /home-office/config
    Description: Name of the SecureString SSM parameter holding the config JSON.

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: python3.12

Resources:

  # ---- Static site hosting -------------------------------------------------
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SiteOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}"

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: s3origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref SiteOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          # AWS managed "CachingOptimized" policy.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        PriceClass: PriceClass_100

  # ---- TOTP-gated API ------------------------------------------------------
  UnlockFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/
      Handler: app.handler
      Environment:
        Variables:
          PARAMETER_NAME: !Ref ParameterName
      Policies:
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ParameterName}"
        # SecureString uses the AWS-managed SSM KMS key by default; decrypt is allowed
        # by the SSM service. If you switch to a customer-managed key, add kms:Decrypt here.
      Events:
        Unlock:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /unlock
            Method: POST

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type

Outputs:
  SiteURL:
    Description: Public URL for the guest page (put this in the desk QR code).
    Value: !Sub "https://${SiteDistribution.DomainName}"
  SiteBucketName:
    Description: Upload the contents of site/ here.
    Value: !Ref SiteBucket
  ApiEndpoint:
    Description: API base URL — set this as API_BASE in site/config.js.
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
