AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GitHub Actions OIDC federation for CI deploys of home-office. Creates a
  repo+branch-scoped IAM role that GitHub Actions may assume (via a short-lived
  OIDC token — no stored secrets) to deploy the app CloudFormation stack and
  sync the static site.

  NOTE: the account already has the GitHub OIDC provider (created by the
  bin-builder stack). Keep CreateOIDCProvider='false' to reuse it — the provider
  is account-wide and may exist only once.

Parameters:
  GitHubOrg:
    Type: String
    Default: jroberts64
    Description: GitHub org/user that owns the repo.
  GitHubRepo:
    Type: String
    Default: home-office
    Description: Repository name (match the actual GitHub repo name).
  GitHubRef:
    Type: String
    Default: refs/heads/main
    Description: Git ref allowed to assume the role (branch-scoped).
  AppStackName:
    Type: String
    Default: home-office-app
    Description: Name of the application CloudFormation stack the role may manage.
  CreateOIDCProvider:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: >
      Create the GitHub OIDC provider. Keep 'false' — the provider already
      exists in account 019135476568 (created by bin-builder). Set 'true' only
      in a fresh account.

Conditions:
  ShouldCreateOIDC: !Equals [!Ref CreateOIDCProvider, 'true']

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDC
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${GitHubRepo}-gha-deploy'
      Description: !Sub 'GitHub Actions deploy role for ${GitHubOrg}/${GitHubRepo}'
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                # Scope to exactly this repo AND ref — nothing else can assume it.
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${GitHubRepo}:ref:${GitHubRef}'
      Policies:
        - PolicyName: deploy-app-stack
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Manage the application stack via CloudFormation.
              - Sid: CloudFormationStack
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:ListStackResources
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:GetTemplateSummary
                Resource:
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AppStackName}/*'
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AppStackName}'
              - Sid: CloudFormationValidate
                Effect: Allow
                Action: cloudformation:ValidateTemplate
                Resource: '*'

              # S3: the static-site bucket (sync) and the deploy/code bucket (Lambda zip).
              - Sid: S3SiteAndCode
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub 'arn:aws:s3:::${GitHubRepo}-*'
                  - !Sub 'arn:aws:s3:::${GitHubRepo}-*/*'
              - Sid: S3CreateBuckets
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:PutEncryptionConfiguration
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                Resource: !Sub 'arn:aws:s3:::${GitHubRepo}-*'

              # CloudFront distribution + OAC (no resource-level scoping available).
              - Sid: CloudFront
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:TagResource
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:UpdateOriginAccessControl
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetInvalidation
                Resource: '*'

              # Lambda + its log group + HTTP API.
              - Sid: Lambda
                Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:DeleteFunction
                  - lambda:TagResource
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:home-office-*'
              - Sid: ApiGateway
                Effect: Allow
                Action:
                  - apigateway:POST
                  - apigateway:GET
                  - apigateway:PATCH
                  - apigateway:PUT
                  - apigateway:DELETE
                  # API Gateway V2 auto-tags resources (e.g. the stage) on
                  # create; tagging uses dedicated actions, not the HTTP verbs.
                  - apigateway:TagResource
                  - apigateway:UntagResource
                Resource: !Sub 'arn:aws:apigateway:${AWS::Region}::*'
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/home-office-*'

              # Pass + manage the Lambda execution role the stack defines.
              - Sid: IamForLambdaRole
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:TagRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/${AppStackName}-*'

Outputs:
  DeployRoleArn:
    Description: Role ARN for the GitHub Actions workflow to assume (set as repo var AWS_DEPLOY_ROLE_ARN).
    Value: !GetAtt DeployRole.Arn
