<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Basement Office — Guest Guide</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header>
      <div class="badge">🏠</div>
      <h1>Basement Office</h1>
      <p class="sub">Welcome! Here's how to use everything down here.</p>
    </header>

    <!-- Grid of tiles. Loads on open; WiFi asks for the PIN when tapped. -->
    <section id="content" hidden></section>

    <footer>
      <p>WiFi needs the rotating 6-digit PIN from the desk gadget — it changes every 30 seconds.</p>
    </footer>
  </main>

  <!-- Detail pop-up. Native <dialog> gives us focus trapping + Esc-to-close. -->
  <dialog id="modal" aria-labelledby="modal-title">
    <div class="modal-panel">
      <button id="modal-close" type="button" class="modal-close" aria-label="Close">×</button>
      <h2 id="modal-title"></h2>
      <p id="modal-sub" class="modal-sub" hidden></p>
      <div id="modal-body"></div>
    </div>
  </dialog>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
